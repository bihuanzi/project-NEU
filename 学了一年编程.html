<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- 这是一个注释,这一段是用来适配屏幕大小的 -->
    <title>学了一年编程</title>
    <style>
        p {
            color : black;
            background: white;
            line-height: 1.5;
        }
        div {
            color: red;
            font-size: 50px;
        }
        #cheater {
            color: blue;
            font-size: 25px;
        }
    </style>
    <script>
        console.log("这是一个JavaScript脚本");
        let catchelement = document.querySelector("p");
        catchelement="这是一个新的段落内容";
        console.log(catchelement);
    </script>
</head>
<body>
    <h1>这是一个标题</h1>
    <p>这是一个段落。</p>
    <p>段落二。</p>
    <p>大傻逼</p>
    <div>
        啥东西你都点
    </div>
    <a href="https://www.example.com">这是一个链接</a>
    <br>

    <a href="https://www.yuanshen.com" id="cheater">千万别点</a>
</body>
</html>
